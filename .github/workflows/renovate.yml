name: Renovate
on:
  push:
    branches:
      - 'renovate/**'

permissions:
  contents: read

jobs:
  check:
    name: Check Renovate update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test